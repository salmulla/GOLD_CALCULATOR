<!-- templates/base.html -->
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">

  <title>{% block title %}حاسبة الذهب{% endblock %}</title>

  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- PWA -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#f8f9fa">

  <!-- iPhone / iPad install -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="حاسبة الذهب">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/any_180.png') }}">

  <!-- Viewport & safe areas -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">

  <style>
    html{
      -webkit-text-size-adjust:100%;
      scroll-behavior:smooth;
    }

    :root{
      --fs-xs: clamp(12px, 2.8vw, 13px);
      --fs-sm: clamp(13px, 3.2vw, 14px);
      --fs-md: clamp(14px, 3.6vw, 16px);
      --fs-lg: clamp(18px, 6vw, 24px);
      --fs-xl: clamp(26px, 8vw, 40px);

      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);

      --bg: #f6f8fb;
      --bg-2: #eef3f8;
      --surface: rgba(255,255,255,0.88);
      --surface-2: rgba(255,255,255,0.7);
      --border: rgba(24,60,90,.08);

      --text: #1f2a37;
      --muted: #6b7280;
      --heading: #183c5a;

      --brand-gold: #d4a514;
      --brand-gold-light: #f1c338;
      --brand-gold-cta: linear-gradient(135deg, #f6d365 0%, #d4a514 100%);
      --brand-gold-cta-hover: linear-gradient(135deg, #f9de84 0%, #e0b122 100%);
      --brand-blue: #183c5a;

      --success: #1da36b;
      --danger: #ef5a2a;
      --warning: #f59e0b;

      --card-radius: 24px;
      --control-radius: 18px;
      --container-w: 760px;

      --shadow-lg: 0 18px 40px rgba(15, 23, 42, .10);
      --shadow-md: 0 10px 24px rgba(15, 23, 42, .08);
      --shadow-sm: 0 6px 14px rgba(15, 23, 42, .06);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(212,165,20,.10), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      padding-top: calc(14px + var(--sat));
      padding-right: 12px;
      padding-left: 12px;
      padding-bottom: calc(110px + var(--sab));
      font-family: "Tajawal", "Segoe UI", Tahoma, Arial, sans-serif;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
    }

    .container,
    .container-fluid{
      padding-left: 10px;
      padding-right: 10px;
    }

    .app-content{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding: clamp(16px, 3vw, 28px);
    }

    .app-card,
    .card{
      overflow:hidden;
      width:100%;
      max-width:var(--container-w);
      background:var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border:1px solid var(--border);
      border-radius:var(--card-radius);
      box-shadow:var(--shadow-lg);
      color:var(--text);
    }

    .app-card{
      padding: clamp(18px, 3.2vw, 28px);
    }

    .card{
      background: var(--surface);
    }

    .card-body{
      color: var(--text);
    }

    .app-card .row{
      margin-right:0 !important;
      margin-left:0 !important;
      --bs-gutter-x: 12px;
    }

    .title-gold{
      font-weight:900;
      font-size: clamp(28px, 4.6vw, 42px);
      line-height:1.15;
      margin-bottom:18px;
      text-align:center;
      background: linear-gradient(135deg, #b88912 0%, #d4a514 35%, #f1c338 70%, #a97b12 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .section-title{
      font-weight:800;
      font-size:clamp(18px, 2.8vw, 24px);
      margin:18px 0 10px;
      color:var(--heading);
    }

    .section-title-sub{
      font-weight:700;
      font-size:clamp(16px, 2.4vw, 21px);
      margin:16px 0 10px;
      color:#4b5563;
    }

    .muted,
    .text-muted{
      color:var(--muted) !important;
    }

    .note-box{
      border:1px solid rgba(12,108,182,.15);
      background: #eef7ff;
      border-radius:16px;
      padding:14px 16px;
      font-weight:600;
      color:#0c6cb6;
    }

    .full-center{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .form-label{
      color:#374151;
      font-weight:700;
      margin-bottom:8px;
    }

    .form-control,
    .form-select,
    input,
    select,
    textarea{
      font-size:16px;
    }

    .form-control,
    .form-select{
      min-height:58px;
      border-radius:var(--control-radius);
      border:1px solid rgba(24,60,90,.10);
      background:#fff;
      color:var(--text);
      padding-inline:16px;
      box-shadow:none !important;
    }

    .form-control::placeholder,
    input::placeholder,
    textarea::placeholder{
      color:#9ca3af;
      font-size:1rem;
    }

    .form-control:focus,
    .form-select:focus{
      border-color: rgba(212,165,20,.45);
      background: #fff;
      color: var(--text);
      box-shadow: 0 0 0 4px rgba(212,165,20,.10) !important;
    }

    .form-control:disabled,
    .form-select:disabled{
      background: #f3f4f6;
      color: #92a0b8;
    }

    .btn-buy,
    .btn-gold-gradient,
    .primary-btn{
      display:block;
      width:100%;
      min-height:56px;
      border:none;
      border-radius:18px;
      padding:14px 20px;
      font-weight:800;
      font-size:18px;
      background: var(--brand-gold-cta);
      color:#201804 !important;
      box-shadow: 0 12px 24px rgba(212,165,20,.18);
      transition: transform .15s ease, filter .2s ease, box-shadow .2s ease;
      text-decoration:none !important;
    }

    .btn-buy:hover,
    .btn-gold-gradient:hover,
    .primary-btn:hover{
      background: var(--brand-gold-cta-hover);
      filter: brightness(1.02);
      transform: translateY(-1px);
    }

    .btn-buy:active,
    .btn-gold-gradient:active,
    .primary-btn:active{
      transform: translateY(1px);
    }

    .btn-buy{
      width:min(100%, 260px);
      margin:24px auto 0;
    }

    .btn-gold-solid{
      background: #fff;
      color: var(--brand-blue) !important;
      border:1px solid rgba(24,60,90,.10);
      border-radius:16px;
      padding:12px 18px;
      font-weight:700;
      transition: all .2s ease;
    }

    .btn-gold-solid:hover{
      background: #faf7ea;
      color:var(--brand-blue) !important;
    }

    .btn-gold-solid.is-active{
      background: var(--brand-gold-cta);
      color:#201804 !important;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(212,165,20,.18);
    }

    .btn-gold-solid.inactive{
      opacity:.65;
    }

    .btn-submit{
      width:100%;
      height:56px;
      font-size:1.05rem;
    }

    .toggle-wrap{
      display:flex;
      gap:12px;
    }

    .toggle-wrap > .btn{
      flex:1;
    }

    .mode-btn{
      opacity:.82;
    }

    .mode-btn.is-active{
      opacity:1;
    }

    .karat-grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:12px;
      padding-inline:4px;
    }

    @media (max-width:420px){
      .karat-grid{
        grid-template-columns: repeat(3, minmax(0,1fr));
      }
    }

    .karat-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:0;
      height:48px;
      border-radius:14px;
      padding:0 10px;
      white-space:nowrap;
    }

    .karat-scroll{
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding:4px 6px 10px;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
    }

    .karat-scroll .karat-chip{
      flex:0 0 auto;
      min-width:88px;
      height:48px;
      border-radius:14px;
      scroll-snap-align:start;
    }

    .karat-scroll::-webkit-scrollbar{
      display:none;
    }

    .skeleton{
      background: linear-gradient(90deg, rgba(0,0,0,.05) 25%, rgba(0,0,0,.10) 37%, rgba(0,0,0,.05) 63%);
      background-size:400% 100%;
      animation: shimmer 1.2s infinite;
      border-radius:8px;
    }

    @keyframes shimmer{
      0%{background-position:100% 0}
      100%{background-position:-100% 0}
    }

    .sk-price{ width:160px; height:36px; }
    .sk-meta{ height:14px; width:240px; }

    .trend-head .price-label{
      font-size:var(--fs-md);
      color:#4b5563;
    }

    .price-row{
      display:flex;
      align-items:center;
    }

    .price-big{
      color:var(--heading);
      font-weight:900;
      font-size:var(--fs-xl);
      line-height:1.05;
      align-items:baseline;
      gap:.25rem;
    }

    .meta-row{
      row-gap:.4rem;
    }

    .price-big.up{ color:var(--success); }
    .price-big.down{ color:var(--danger); }

    .price-big .currency{
      font-size:.9em;
      margin-inline-start:.5rem;
    }

    .delta{
      font-weight:700;
    }

    .delta .up{ color:var(--success); }
    .delta .down{ color:var(--danger); }

    .status-badge{
      margin-right:16px;
      font-weight:800;
      padding:.42rem .85rem;
      border-radius:999px;
      font-size:var(--fs-sm);
      color:#fff;
    }

    .status-badge.up{ background:var(--success); }
    .status-badge.down{ background:var(--danger); }
    .status-badge.flat{ background:#667085; }

    .last-update{
      background: #eef3f6;
      color:#4b5563 !important;
      padding:.35rem .65rem;
      border-radius:10px;
    }

    .refresh-btn{
      width:44px;
      height:44px;
      border:none;
      border-radius:999px;
      display:grid;
      place-items:center;
      margin-inline-start:auto;
      background: #fff;
      color: var(--text);
      border:1px solid rgba(24,60,90,.10);
    }

    .refresh-btn i{
      font-size:1.2rem;
    }

    .refresh-btn:active{
      transform: scale(.97);
    }

    #goldChart{
      width:100% !important;
      height:100% !important;
    }

    .chart-card{
      height:min(62vh, 520px);
    }

    .loading-bar{
      position:absolute;
      inset-inline:0;
      top:0;
      height:3px;
      overflow:hidden;
      background: rgba(0,0,0,.05);
    }

    .loading-bar::before{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      left:-40%;
      width:40%;
      background: linear-gradient(90deg, var(--brand-gold-light), var(--brand-gold));
      animation: indeterminate 1s ease-in-out infinite;
    }

    @keyframes indeterminate{
      from{ left:-40%; }
      to{ left:100%; }
    }

    @keyframes spin{
      to{ transform: rotate(360deg); }
    }

    .refresh-btn.loading .bi{
      animation: spin .9s linear infinite;
    }

    .refresh-btn.loading{
      opacity:.75;
      cursor:wait;
    }

    .app-tabbar{
      position:fixed;
      left:12px;
      right:12px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      height:78px;
      background: rgba(255,255,255,.92);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      border:1px solid rgba(24,60,90,.08);
      border-radius:24px;
      display:grid;
      grid-template-columns: 1fr 1.9fr 1.8fr 1fr;
      column-gap:0;
      z-index:1050;
      box-shadow: var(--shadow-lg);
      overflow:visible;
    }

    .nav-item,
    .app-tabbar a.tab{
      position:relative;
      text-decoration:none;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:.78rem;
      line-height:1.2;
      transition: color .2s ease, transform .15s ease;
    }

    .nav-item i,
    .app-tabbar a.tab i{
      font-size:1.28rem;
    }

    .app-tabbar .nav-item.active,
    .app-tabbar .nav-item.active i,
    .app-tabbar .nav-item.active span{
      color:var(--brand-gold) !important;
      font-weight:800;
    }

    .app-tabbar .nav-item.active::after{
      content:"";
      position:absolute;
      bottom:6px;
      width:34%;
      height:2.5px;
      background: var(--brand-gold);
      border-radius:2px;
    }

    .fab-zakat{
      position:absolute;
      left:50%;
      bottom:22px;
      transform:translateX(-50%) translateZ(0);
      width:74px;
      height:74px;
      border-radius:999px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-family:system-ui, "IBM Plex Sans Arabic", "GE SS", Tahoma, sans-serif;
      font-weight:800;
      letter-spacing:.25px;
      isolation:isolate;
      z-index:1100;
      border:2px solid rgba(255,255,255,.85);
      will-change:transform;
      background:
        radial-gradient(120% 120% at 75% 25%, rgba(255,255,255,.18) 0%, transparent 45%),
        linear-gradient(145deg, #EAC14E 0%, #5041b3 100%);
      box-shadow:
        0 12px 26px rgba(24,16,80,.18),
        0 0 0 8px rgba(234,193,78,.24);
      transition: transform .22s ease, box-shadow .22s ease, filter .22s ease;
      -webkit-tap-highlight-color:transparent;
    }

    .fab-zakat::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background: radial-gradient(120% 70% at 50% 0%, rgba(255,255,255,.75) 0%, rgba(255,255,255,.25) 24%, transparent 55%);
      mix-blend-mode: soft-light;
      pointer-events:none;
    }

    .fab-zakat:hover{
      transform:translateX(-50%) translateY(-2px) scale(1.02);
      box-shadow:
        0 18px 34px rgba(24,16,80,.24),
        0 0 0 10px rgba(234,193,78,.30);
    }

    .fab-zakat:active{
      transform:translateX(-50%) scale(.98);
      filter:brightness(.98);
    }

    .fab-zakat .fab-text{
      position:relative;
      z-index:1;
      font-size:18px;
      line-height:1;
      text-shadow:0 1px 2px rgba(0,0,0,.22);
      user-select:none;
      color:#f4e5c4;
    }

    .fab-zakat .fab-icon{
      position:absolute;
      inset:0;
      margin:auto;
      width:62%;
      height:62%;
      opacity:.18;
      color:#fff;
      pointer-events:none;
    }

    .app-tabbar a.fab-zakat.active{
      filter:brightness(1.05);
      box-shadow:
        0 20px 36px rgba(24,16,80,.26),
        0 0 0 12px rgba(234,193,78,.34);
    }

    @keyframes zakati-pulse{
      0%   { box-shadow: 0 12px 26px rgba(24,16,80,.18), 0 0 0 6px rgba(234,193,78,.24); }
      70%  { box-shadow: 0 12px 26px rgba(24,16,80,.18), 0 0 0 14px rgba(234,193,78,0.0); }
      100% { box-shadow: 0 12px 26px rgba(24,16,80,.18), 0 0 0 6px rgba(234,193,78,.24); }
    }

    .fab-zakat.pulse{
      animation: zakati-pulse 2.2s ease-in-out infinite;
    }

    .form-hint{
      font-size:var(--fs-xs);
      color:var(--muted);
      margin-top:6px;
    }

    .calc-breakdown{
      border:1px solid rgba(24,60,90,.10);
      border-radius:16px;
      overflow:hidden;
      background: rgba(255,255,255,.90);
    }

    .calc-breakdown .rowline{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      border-top:1px solid rgba(24,60,90,.08);
      font-size:var(--fs-sm);
    }

    .calc-breakdown .rowline:first-child{
      border-top:0;
    }

    .calc-breakdown .k{
      color:var(--muted);
      font-weight:700;
    }

    .calc-breakdown .v{
      font-weight:900;
      color:var(--heading);
    }

    .btn-ghost{
      border:1px solid rgba(24,60,90,.10);
      background: #fff;
      color: var(--text);
      font-weight:800;
      border-radius:14px;
      padding:10px 14px;
    }

    .btn-ghost:hover{
      background: rgba(212,165,20,.08);
      color:#111827;
    }

    .alert{
      border:none;
      border-radius:16px;
      box-shadow: var(--shadow-sm);
    }

    .app-card ul{
      padding-inline-start:1.2rem;
    }

    .app-card li{
      margin:.35rem 0;
    }

    a{
      color: inherit;
    }

    @media (prefers-reduced-motion: reduce){
      .fab-zakat{
        transition:none;
      }
      .fab-zakat.pulse{
        animation:none;
      }
    }

    @media (max-width:576px){
      .receipts-modal .modal-dialog{
        height:96svh;
        max-height:96svh;
      }
      .modal-dialog.modal-xl{
        max-width:100vw !important;
      }
      .meta-row{
        flex-direction:column;
        align-items:flex-start;
      }
    }

    @media (max-width:420px){
      .fab-zakat{
        width:66px;
        height:66px;
      }
      .fab-zakat .fab-text{
        font-size:16px;
      }
      .toggle-wrap{
        gap:10px;
      }
    }

    @media (max-width:400px){
      .app-tabbar .nav-item span{
        font-size:.72rem;
      }
      .app-tabbar .nav-item i{
        font-size:1.12rem;
      }
    }

    @media (max-width:768px){
      .meta-row{
        gap:.5rem;
      }
      .last-update{
        margin-top:.5rem;
      }
    }

    @media (min-width:992px){
      .app-card{
        padding:32px 36px;
      }
    }
  </style>
</head>

<body>
  <div class="container py-4">
    {% block content %}{% endblock %}
  </div>

  <nav class="app-tabbar">
    <a href="/trend" class="nav-item">
      <i class="bi bi-graph-up-arrow"></i>
      <span>المؤشر</span>
    </a>

    <a href="/" class="nav-item">
      <i class="bi bi-coin"></i>
      <span>التبادل الذهبي<br>(تداول)</span>
    </a>

    <a href="/zakat" class="fab-zakat pulse" aria-label="حاسبة زكاة الذهب">
      <svg class="fab-icon" viewBox="0 0 48 48" aria-hidden="true">
        <circle cx="24" cy="24" r="15" opacity="0.18" fill="currentColor"/>
        <circle cx="24" cy="24" r="11" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.75"/>
        <path d="M24 16v16M19 21h10M19 27h10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
        <path d="M30 18h6v6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="fab-text">زكاتي</span>
    </a>

    <a href="/basic" class="nav-item">
      <i class="bi bi-calculator"></i>
      <span>احسب ذهبك الآن</span>
    </a>

    <a href="/more" class="nav-item">
      <i class="bi bi-gear"></i>
      <span>المزيد</span>
    </a>
  </nav>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const current = new URL(location.href).pathname.replace(/\/+$/,'') || '/';

      document.querySelectorAll(".app-tabbar a.nav-item").forEach(a => {
        const href = a.getAttribute("href") || "/";
        const hrefPath = new URL(href, location.origin).pathname.replace(/\/+$/,'') || '/';
        a.classList.toggle("active", hrefPath === current);
      });

      const zakatFab = document.querySelector(".fab-zakat");
      if (zakatFab) zakatFab.classList.toggle("active", current === "/zakat");
    });
  </script>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
      <div class="container mt-3" dir="rtl">
        {% for cat, msg in msgs %}
          <div class="alert alert-{{ 'warning' if cat=='warn' else cat }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
</body>
</html>
